<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Prison Escape VR Quiz</title>
<!-- A-Frame 1.4.2 - 안정적인 Quest 지원 버전 -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script>
// ═══════════════════════════════════════════════
// 퀴즈 데이터
// ═══════════════════════════════════════════════
const QUIZ = {
  ko:[
    {q:"대한민국의 수도는?",         c:["부산","서울","인천","대전"],          a:1},
    {q:"1 + 1 × 2 = ?",            c:["4","3","2","6"],                   a:1},
    {q:"물의 끓는점 (°C)?",          c:["90","110","100","80"],             a:2},
    {q:"세계에서 가장 큰 대륙은?",    c:["아프리카","유럽","아시아","아메리카"],  a:2},
    {q:"영어로 '사과'는?",           c:["Banana","Mango","Grape","Apple"],  a:3}
  ],
  en:[
    {q:"Capital of South Korea?",      c:["Busan","Seoul","Incheon","Daejeon"],  a:1},
    {q:"1 + 1 x 2 = ?",               c:["4","3","2","6"],                      a:1},
    {q:"Boiling point of water (C)?",  c:["90","110","100","80"],               a:2},
    {q:"Largest continent?",           c:["Africa","Europe","Asia","America"],   a:2},
    {q:"'사과' in English?",           c:["Banana","Mango","Grape","Apple"],     a:3}
  ]
};

// ═══════════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════════
let lang='ko', qs=[], cur=0, score=0, answered=false, phase='lang';

// ═══════════════════════════════════════════════
// 컴포넌트 등록 (A-Frame 로드 후)
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {

  // ----- 버튼 호버/클릭 컴포넌트 -----
  AFRAME.registerComponent('vrbtn', {
    schema: {action:{type:'string',default:''}},
    init: function(){
      var el=this.el, act=this.data.action;
      el.addEventListener('mouseenter',function(){
        el.setAttribute('material','emissive','#a07818');
        el.setAttribute('material','emissiveIntensity','0.55');
      });
      el.addEventListener('mouseleave',function(){
        el.setAttribute('material','emissive','#000000');
        el.setAttribute('material','emissiveIntensity','0');
      });
      el.addEventListener('click',function(){ dispatch(act); });
    }
  });

  // ----- Quest 컨트롤러 이동 컴포넌트 -----
  // 왼쪽 조이스틱 → 앞뒤좌우 이동
  // 오른쪽 조이스틱 → 좌우 회전
  AFRAME.registerComponent('quest-move', {
    init: function(){
      this.vel = new THREE.Vector3();
      this.leftAxis  = {x:0, y:0};
      this.rightAxis = {x:0, y:0};

      var self = this;
      // 왼쪽 컨트롤러 축
      document.addEventListener('axismove', function(e){
        var hand = e.target.getAttribute('laser-controls') ||
                   e.target.getAttribute('oculus-touch-controls');
        if (!hand) return;
        var h = (hand && hand.hand) ? hand.hand :
                e.target.id === 'lc' ? 'left' : 'right';
        if (h === 'left')  { self.leftAxis.x  = e.detail.axis[2]||0; self.leftAxis.y  = e.detail.axis[3]||0; }
        if (h === 'right') { self.rightAxis.x = e.detail.axis[2]||0; self.rightAxis.y = e.detail.axis[3]||0; }
      });
    },
    tick: function(t, dt){
      if (!dt) return;
      var s  = dt * 0.004;   // 이동 속도
      var rs = dt * 0.08;    // 회전 속도 (도)
      var rig = this.el;
      var cam = document.querySelector('[camera]');
      if (!cam) return;

      // 카메라 수평 방향 구하기
      var camRot = cam.object3D.rotation.y + rig.object3D.rotation.y;
      var fwd = new THREE.Vector3(-Math.sin(camRot), 0, -Math.cos(camRot));
      var right= new THREE.Vector3( Math.cos(camRot), 0, -Math.sin(camRot));

      // 왼쪽 조이스틱: 이동
      var lx = this.leftAxis.x, ly = this.leftAxis.y;
      if (Math.abs(lx)>0.1 || Math.abs(ly)>0.1) {
        var pos = rig.object3D.position;
        pos.addScaledVector(fwd,  -ly * s);
        pos.addScaledVector(right, lx * s);
        // 방 경계
        pos.x = Math.max(-3.5, Math.min(3.5, pos.x));
        pos.z = Math.max(-5.5, Math.min(4.5, pos.z));
        rig.object3D.position.copy(pos);
      }
      // 오른쪽 조이스틱: 회전
      var rx = this.rightAxis.x;
      if (Math.abs(rx)>0.15) {
        rig.object3D.rotation.y -= rx * rs * (Math.PI/180);
      }
    }
  });

}); // DOMContentLoaded

// ═══════════════════════════════════════════════
// 게임 함수
// ═══════════════════════════════════════════════
function dispatch(act){
  if (!act) return;
  if (act==='lang_ko'){ lang='ko'; startQuiz(); }
  else if(act==='lang_en'){ lang='en'; startQuiz(); }
  else if(act==='retry'){ startQuiz(); }
  else if(act.startsWith('choice_')){ selectAnswer(parseInt(act.split('_')[1])); }
}

function startQuiz(){
  phase='quiz';
  qs=[...QUIZ[lang]];
  for(var i=qs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=qs[i];qs[i]=qs[j];qs[j]=t;}
  cur=0; score=0; answered=false;
  vis('lang-panel',false);
  vis('result-panel',false);
  vis('quiz-panel',true);
  resetDoors();
  renderQ();
}

function selectAnswer(idx){
  if(answered||phase!=='quiz') return;
  answered=true;
  var q=qs[cur];
  for(var i=0;i<4;i++){
    var bg=ge('cbg'+i), tx=ge('ctx'+i);
    if(!bg) continue;
    if(i===q.a){
      bg.setAttribute('material','color','#0d2e22');
      bg.setAttribute('material','emissive','#1d9e75');
      bg.setAttribute('material','emissiveIntensity','0.65');
      if(tx) tx.setAttribute('value','✓ '+q.c[i]);
    } else if(i===idx){
      bg.setAttribute('material','color','#2e0e08');
      bg.setAttribute('material','emissive','#d85a30');
      bg.setAttribute('material','emissiveIntensity','0.5');
    }
  }
  if(idx===q.a) score++;
  var fb=ge('fb');
  if(fb){
    var ok=idx===q.a;
    fb.setAttribute('value', ok?(lang==='ko'?'✓ 정답!':'✓ Correct!'):(lang==='ko'?'✗ 오답':'✗ Wrong'));
    fb.setAttribute('color', ok?'#5dcaa5':'#f0997b');
  }
  sv('hud', hudTxt());
  setTimeout(function(){
    cur++;
    if(cur<qs.length){answered=false;renderQ();}
    else showResult();
  },1800);
}

function renderQ(){
  var q=qs[cur];
  sv('qtxt', q.q);
  sv('fb','');
  sv('hud', hudTxt());
  var L=['①','②','③','④'];
  for(var i=0;i<4;i++){
    var bg=ge('cbg'+i),tx=ge('ctx'+i);
    if(bg){bg.setAttribute('material','color','#1a1510');bg.setAttribute('material','emissive','#000000');bg.setAttribute('material','emissiveIntensity','0');}
    if(tx) tx.setAttribute('value',L[i]+'  '+q.c[i]);
  }
}

function hudTxt(){
  return lang==='ko'
    ? 'Q '+(cur+1)+' / '+qs.length+'     정답 '+score+'개'
    : 'Q '+(cur+1)+' / '+qs.length+'     Score '+score;
}

function showResult(){
  phase='result';
  vis('quiz-panel',false);
  var pct=score/qs.length, ok=pct>=0.8;
  if(ok) openDoors();
  sv('rtitle', ok?(lang==='ko'?'탈출 성공!':'ESCAPED!'):(lang==='ko'?'탈출 실패':'FAILED'));
  ge('rtitle').setAttribute('color', ok?'#5dcaa5':'#f0997b');
  sv('rscore', score+' / '+qs.length+'  ('+Math.round(pct*100)+'%)');
  sv('rmsg',   ok?(lang==='ko'?'감옥 문이 열렸습니다!':'The cell door is open!')
                 :(lang==='ko'?'80% 이상 맞춰야 탈출합니다':'Need 80%+ to escape'));
  sv('rretry', lang==='ko'?'↺  다시 도전':'↺  Try Again');
  vis('result-panel',true);
}

function openDoors(){
  var dl=ge('door-left'),dr=ge('door-right');
  if(dl) dl.setAttribute('animation','property:rotation;to:0 -90 0;dur:2000;easing:easeInOutQuad');
  if(dr) dr.setAttribute('animation','property:rotation;to:0 90 0;dur:2000;easing:easeInOutQuad');
}
function resetDoors(){
  var dl=ge('door-left'),dr=ge('door-right');
  if(dl){dl.removeAttribute('animation');dl.setAttribute('rotation','0 0 0');}
  if(dr){dr.removeAttribute('animation');dr.setAttribute('rotation','0 0 0');}
}

function ge(id){return document.getElementById(id);}
function sv(id,v){var e=ge(id);if(e)e.setAttribute('value',v);}
function vis(id,v){var e=ge(id);if(e)e.setAttribute('visible',v?'true':'false');}

window.addEventListener('load',function(){
  vis('lang-panel',true);
  vis('quiz-panel',false);
  vis('result-panel',false);
});
</script>
</head>

    <a-text id="qtxt" value=""
