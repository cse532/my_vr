<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Prison Escape VR Quiz</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script>
  // ─── 퀴즈 데이터 ────────────────────────────────────────────────────────────
  const quizData = {
    ko: [
      { q: "대한민국의 수도는?", choices: ["부산","서울","인천","대전"], answer: 1 },
      { q: "1 + 1 × 2 = ?", choices: ["4","3","2","6"], answer: 1 },
      { q: "물의 끓는점은? (°C)", choices: ["90","110","100","80"], answer: 2 },
      { q: "세계에서 가장 큰 대륙은?", choices: ["아프리카","유럽","아시아","아메리카"], answer: 2 },
      { q: "영어로 '사과'는?", choices: ["Banana","Mango","Grape","Apple"], answer: 3 }
    ],
    en: [
      { q: "Capital of South Korea?", choices: ["Busan","Seoul","Incheon","Daejeon"], answer: 1 },
      { q: "1 + 1 x 2 = ?", choices: ["4","3","2","6"], answer: 1 },
      { q: "Boiling point of water? (C)", choices: ["90","110","100","80"], answer: 2 },
      { q: "Largest continent?", choices: ["Africa","Europe","Asia","America"], answer: 2 },
      { q: "Apple in Korean?", choices: ["Banana","Mango","Grape","Sagwa"], answer: 3 }
    ]
  };

  // ─── 상태 ────────────────────────────────────────────────────────────────────
  let lang = 'ko';
  let questions = [];
  let currentQ = 0;
  let score = 0;
  let answered = false;
  let gamePhase = 'lang';

  // ─── 커스텀 컴포넌트 ─────────────────────────────────────────────────────────
  AFRAME.registerComponent('btn-hover', {
    init: function () {
      const el = this.el;
      const action = el.dataset.action;
      el.addEventListener('mouseenter', () => {
        el.setAttribute('material', 'emissive', '#c8a030');
        el.setAttribute('material', 'emissiveIntensity', '0.45');
      });
      el.addEventListener('mouseleave', () => {
        el.setAttribute('material', 'emissive', '#000000');
        el.setAttribute('material', 'emissiveIntensity', '0');
      });
      el.addEventListener('click', () => {
        if (action) dispatch(action);
      });
    }
  });

  // ─── 액션 디스패처 ───────────────────────────────────────────────────────────
  function dispatch(action) {
    if (action === 'lang_ko') { lang = 'ko'; startQuiz(); }
    else if (action === 'lang_en') { lang = 'en'; startQuiz(); }
    else if (action === 'retry') { retryGame(); }
    else if (action.startsWith('choice_')) {
      selectAnswer(parseInt(action.split('_')[1]));
    }
  }

  // ─── 게임 로직 ───────────────────────────────────────────────────────────────
  function startQuiz() {
    gamePhase = 'quiz';
    questions = [...quizData[lang]];
    for (let i = questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questions[i], questions[j]] = [questions[j], questions[i]];
    }
    currentQ = 0; score = 0; answered = false;
    el('lang-panel').setAttribute('visible','false');
    el('result-panel').setAttribute('visible','false');
    el('quiz-panel').setAttribute('visible','true');
    // 문 초기화
    const dl = el('door-left'), dr = el('door-right');
    if (dl) { dl.removeAttribute('animation'); dl.setAttribute('rotation','0 0 0'); }
    if (dr) { dr.removeAttribute('animation'); dr.setAttribute('rotation','0 0 0'); }
    renderQuestion();
  }

  function selectAnswer(idx) {
    if (answered || gamePhase !== 'quiz') return;
    answered = true;
    const q = questions[currentQ];
    for (let i = 0; i < 4; i++) {
      const bg = el('cbg' + i);
      const tx = el('ctx' + i);
      if (!bg) continue;
      if (i === q.answer) {
        bg.setAttribute('material','color','#0d2e22');
        bg.setAttribute('material','emissive','#1d9e75');
        bg.setAttribute('material','emissiveIntensity','0.55');
        if (tx) tx.setAttribute('value', '✓ ' + q.choices[i]);
      } else if (i === idx && i !== q.answer) {
        bg.setAttribute('material','color','#2e0e08');
        bg.setAttribute('material','emissive','#d85a30');
        bg.setAttribute('material','emissiveIntensity','0.4');
      }
    }
    if (idx === q.answer) score++;
    const fb = el('feedback-text');
    if (fb) {
      const ok = idx === q.answer;
      fb.setAttribute('value', ok
        ? (lang==='ko' ? '✓ 정답!' : '✓ Correct!')
        : (lang==='ko' ? '✗ 오답' : '✗ Wrong'));
      fb.setAttribute('color', ok ? '#5dcaa5' : '#f0997b');
    }
    const hud = el('hud-text');
    if (hud) hud.setAttribute('value', hudLabel());

    setTimeout(() => {
      currentQ++;
      if (currentQ < questions.length) { answered = false; renderQuestion(); }
      else showResult();
    }, 1800);
  }

  function renderQuestion() {
    const q = questions[currentQ];
    setVal('question-text', q.q);
    setVal('feedback-text', '');
    setVal('hud-text', hudLabel());
    const labels = ['①','②','③','④'];
    for (let i = 0; i < 4; i++) {
      const bg = el('cbg' + i);
      const tx = el('ctx' + i);
      if (bg) {
        bg.setAttribute('material','color','#1a1510');
        bg.setAttribute('material','emissive','#000000');
        bg.setAttribute('material','emissiveIntensity','0');
      }
      if (tx) tx.setAttribute('value', labels[i] + '  ' + q.choices[i]);
    }
  }

  function hudLabel() {
    return lang === 'ko'
      ? `Q ${currentQ+1} / ${questions.length}     정답 ${score}개`
      : `Q ${currentQ+1} / ${questions.length}     Score ${score}`;
  }

  function showResult() {
    gamePhase = 'result';
    el('quiz-panel').setAttribute('visible','false');
    const pct = score / questions.length;
    const escaped = pct >= 0.8;
    if (escaped) {
      const dl = el('door-left'), dr = el('door-right');
      if (dl) dl.setAttribute('animation','property:rotation;to:0 -90 0;dur:2000;easing:easeInOutQuad');
      if (dr) dr.setAttribute('animation','property:rotation;to:0 90 0;dur:2000;easing:easeInOutQuad');
    }
    setVal('result-title', escaped
      ? (lang==='ko' ? '🔓 탈출 성공!' : '🔓 ESCAPED!')
      : (lang==='ko' ? '탈출 실패' : 'STILL TRAPPED'));
    el('result-title').setAttribute('color', escaped ? '#5dcaa5' : '#f0997b');
    setVal('result-score', `${score} / ${questions.length}  (${Math.round(pct*100)}%)`);
    setVal('result-msg', escaped
      ? (lang==='ko' ? '감옥 문이 열렸습니다!' : 'The cell door is open!')
      : (lang==='ko' ? '80% 이상 정답이어야 탈출합니다' : 'Need 80%+ correct to escape'));
    setVal('retry-label', lang==='ko' ? '↺  다시 도전' : '↺  Try Again');
    el('result-panel').setAttribute('visible','true');
  }

  function retryGame() { startQuiz(); }

  // ─── 유틸 ────────────────────────────────────────────────────────────────────
  function el(id) { return document.getElementById(id); }
  function setVal(id, v) { const e = el(id); if (e) e.setAttribute('value', v); }

  window.addEventListener('load', () => {
    el('lang-panel').setAttribute('visible','true');
    el('quiz-panel').setAttribute('visible','false');
    el('result-panel').setAttribute('visible','false');
  });
  </script>
</head>
<body style="margin:0;background:#000">
<a-scene
  vr-mode-ui="enabled:true"
  loading-screen="dotsColor:#c8a96e;backgroundColor:#050508"
  cursor="rayOrigin:mouse"
  raycaster="objects:.btn">

  <!-- ── 카메라 ──────────────────────────────────────────────────────────── -->
  <a-entity id="player" position="0 0 3">
    <a-camera
      look-controls="pointerLockEnabled:false"
      wasd-controls="acceleration:14"
      position="0 1.65 0">
      <!-- 시선 커서 (게이즈) -->
      <a-entity
        cursor="fuse:true;fuseTimeout:1500"
        raycaster="objects:.btn;far:10"
        position="0 0 -1"
        geometry="primitive:ring;radiusInner:0.014;radiusOuter:0.022"
        material="color:#c8a96e;shader:flat;opacity:0.85">
        <a-animation attribute="scale" begin="fusing"
          from="1 1 1" to="0.15 0.15 0.15"
          dur="1500" easing="easeInCubic"></a-animation>
        <a-animation attribute="material.color" begin="fusing"
          from="#c8a96e" to="#5dcaa5" dur="1500"></a-animation>
      </a-entity>
    </a-camera>
  </a-entity>

  <!-- ── 조명 ───────────────────────────────────────────────────────────── -->
  <a-entity light="type:ambient;color:#100c06;intensity:0.9"></a-entity>
  <a-entity position="0 2.7 -0.5" light="type:point;color:#e07830;intensity:2.2;distance:11;decay:2">
    <a-animation attribute="light.intensity" from="2.2" to="1.4" dur="210" direction="alternate" repeat="indefinite"></a-animation>
  </a-entity>
  <a-entity position="-3.3 2.3 -2" light="type:point;color:#c06020;intensity:0.75;distance:5"></a-entity>
  <a-entity position="3.3 2.3 1" light="type:point;color:#b05818;intensity:0.65;distance:5"></a-entity>

  <!-- ── 방 구조 ─────────────────────────────────────────────────────────── -->
  <a-box position="0 -0.05 0" width="8" height="0.1" depth="12" material="color:#1c1812;roughness:1"></a-box>
  <a-box position="0 3.65 0" width="8" height="0.12" depth="12" material="color:#141210;roughness:1"></a-box>
  <a-box position="0 1.8 -6" width="8" height="3.72" depth="0.3" material="color:#28221c;roughness:0.95"></a-box>
  <a-box position="-4 1.8 0" width="0.3" height="3.72" depth="12" material="color:#241e18;roughness:0.95"></a-box>
  <a-box position="4 1.8 0" width="0.3" height="3.72" depth="12" material="color:#241e18;roughness:0.95"></a-box>
  <a-box position="0 1.8 6" width="8" height="3.72" depth="0.3" material="color:#1e1a14;roughness:0.97"></a-box>
  <!-- 벽돌 줄 -->
  <a-box position="0 0.9 -5.85" width="8" height="0.04" depth="0.04" material="color:#181410;roughness:1"></a-box>
  <a-box position="0 1.8 -5.85" width="8" height="0.04" depth="0.04" material="color:#181410;roughness:1"></a-box>
  <a-box position="0 2.7 -5.85" width="8" height="0.04" depth="0.04" material="color:#181410;roughness:1"></a-box>

  <!-- ── 감옥 문 ─────────────────────────────────────────────────────────── -->
  <!-- 문틀 -->
  <a-box position="-1.22 1.8 4.88" width="0.14" height="3.65" depth="0.14" material="color:#3a3028;roughness:0.5;metalness:0.8"></a-box>
  <a-box position="1.22 1.8 4.88" width="0.14" height="3.65" depth="0.14" material="color:#3a3028;roughness:0.5;metalness:0.8"></a-box>
  <a-box position="0 3.25 4.88" width="2.5" height="0.14" depth="0.14" material="color:#3a3028;roughness:0.5;metalness:0.8"></a-box>

  <!-- 왼쪽 문짝 (피벗 왼쪽) -->
  <a-entity id="door-left" position="-1.15 0 4.88">
    <a-entity position="0.6 1.65 0">
      <a-cylinder radius="0.04" height="3.3" position="-0.45 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
      <a-cylinder radius="0.04" height="3.3" position="-0.1 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
      <a-cylinder radius="0.04" height="3.3" position="0.28 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
      <a-box width="1.15" height="0.06" depth="0.06" position="-0.09 1.0 0" material="color:#3a3028;metalness:0.85"></a-box>
      <a-box width="1.15" height="0.06" depth="0.06" position="-0.09 -0.4 0" material="color:#3a3028;metalness:0.85"></a-box>
      <a-box width="1.15" height="0.06" depth="0.06" position="-0.09 -1.3 0" material="color:#3a3028;metalness:0.85"></a-box>
    </a-entity>
  </a-entity>

  <!-- 오른쪽 문짝 (피벗 오른쪽) -->
  <a-entity id="door-right" position="1.15 0 4.88">
    <a-entity position="-0.6 1.65 0">
      <a-cylinder radius="0.04" height="3.3" position="0.45 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
      <a-cylinder radius="0.04" height="3.3" position="0.1 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
      <a-cylinder radius="0.04" height="3.3" position="-0.28 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
      <a-box width="1.15" height="0.06" depth="0.06" position="0.09 1.0 0" material="color:#3a3028;metalness:0.85"></a-box>
      <a-box width="1.15" height="0.06" depth="0.06" position="0.09 -0.4 0" material="color:#3a3028;metalness:0.85"></a-box>
      <a-box width="1.15" height="0.06" depth="0.06" position="0.09 -1.3 0" material="color:#3a3028;metalness:0.85"></a-box>
    </a-entity>
  </a-entity>

  <!-- 문 옆 창살 -->
  <a-entity position="-2.7 1.8 4.88">
    <a-cylinder radius="0.04" height="3.3" position="-0.5 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
    <a-cylinder radius="0.04" height="3.3" position="0 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
    <a-cylinder radius="0.04" height="3.3" position="0.5 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
  </a-entity>
  <a-entity position="2.7 1.8 4.88">
    <a-cylinder radius="0.04" height="3.3" position="-0.5 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
    <a-cylinder radius="0.04" height="3.3" position="0 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
    <a-cylinder radius="0.04" height="3.3" position="0.5 0 0" material="color:#2e2820;roughness:0.5;metalness:0.9"></a-cylinder>
  </a-entity>

  <!-- ── 소품 ────────────────────────────────────────────────────────────── -->
  <a-box position="-2.8 0.22 -3.5" width="1" height="0.2" depth="2.2" material="color:#4a3520;roughness:0.95"></a-box>
  <a-box position="-2.8 0.06 -4.5" width="1.1" height="0.12" depth="0.14" material="color:#382810;roughness:1"></a-box>
  <a-cylinder position="2.6 0.22 -4.2" radius="0.18" height="0.38" material="color:#5a4a30;roughness:0.8;metalness:0.35"></a-cylinder>
  <!-- 횃불 -->
  <a-box position="-3.72 2.5 -1.5" width="0.08" height="0.28" depth="0.08" material="color:#5a3a20;roughness:0.9"></a-box>
  <a-sphere position="-3.72 2.68 -1.5" radius="0.1" material="color:#f09040;emissive:#f09040;emissiveIntensity:1"></a-sphere>
  <a-box position="3.72 2.5 0.5" width="0.08" height="0.28" depth="0.08" material="color:#5a3a20;roughness:0.9"></a-box>
  <a-sphere position="3.72 2.68 0.5" radius="0.1" material="color:#f09040;emissive:#f09040;emissiveIntensity:1"></a-sphere>

  <!-- ══════════════════════════════════════════════════════════════════════
       언어 선택 패널 (뒷벽)
  ══════════════════════════════════════════════════════════════════════════ -->
  <a-entity id="lang-panel" position="0 2.0 -5.68" visible="false">
    <!-- 배경 -->
    <a-box width="3.4" height="2.6" depth="0.05" material="color:#0a0805;roughness:0.95;opacity:0.98"></a-box>
    <a-box width="3.44" height="2.64" depth="0.03" material="color:#c8a96e;opacity:0.55" position="0 0 -0.02"></a-box>

    <a-text value="PRISON ESCAPE VR" align="center" color="#c8a96e" width="3.6" position="0 0.95 0.04" font="mozillavr"></a-text>
    <a-text value="감옥 탈출 VR 퀴즈" align="center" color="#8a7050" width="2.4" position="0 0.62 0.04"></a-text>
    <a-text value="언어 선택 / Select Language" align="center" color="#555" width="2.6" position="0 0.3 0.04"></a-text>

    <!-- 한국어 버튼 -->
    <a-box id="btn-ko" width="1.2" height="0.5" depth="0.07" position="-0.75 -0.15 0.04"
      material="color:#201808;roughness:0.7"
      class="btn" btn-hover data-action="lang_ko"></a-box>
    <a-text value="한국어" align="center" color="#c8a96e" width="1.6" position="-0.75 -0.15 0.09"
      class="btn" btn-hover data-action="lang_ko"></a-text>

    <!-- 영어 버튼 -->
    <a-box id="btn-en" width="1.2" height="0.5" depth="0.07" position="0.75 -0.15 0.04"
      material="color:#201808;roughness:0.7"
      class="btn" btn-hover data-action="lang_en"></a-box>
    <a-text value="English" align="center" color="#c8a96e" width="1.6" position="0.75 -0.15 0.09"
      class="btn" btn-hover data-action="lang_en"></a-text>

    <a-text value="시선을 버튼에 1.5초 고정 → 선택" align="center" color="#3a3228" width="2.8" position="0 -0.72 0.04"></a-text>
    <a-text value="Gaze at button for 1.5s to select" align="center" color="#2e2c28" width="2.8" position="0 -0.92 0.04"></a-text>
  </a-entity>

  <!-- ══════════════════════════════════════════════════════════════════════
       퀴즈 패널 (뒷벽)
  ══════════════════════════════════════════════════════════════════════════ -->
  <a-entity id="quiz-panel" position="0 2.05 -5.68" visible="false">
    <!-- 배경 -->
    <a-box width="4.0" height="3.4" depth="0.05" material="color:#0a0805;roughness:0.95;opacity:0.98"></a-box>
    <a-box width="4.04" height="3.44" depth="0.03" material="color:#c8a96e;opacity:0.5" position="0 0 -0.02"></a-box>

    <!-- HUD -->
    <a-text id="hud-text" value="Q 1/5  정답 0개" align="center" color="#6a5a30" width="3.8" position="0 1.57 0.04"></a-text>

    <!-- 문제 -->
    <a-text id="question-text" value="" align="center" color="#e8dcc8" width="3.5" wrap-count="24" position="0 1.1 0.04"></a-text>

    <!-- 선택지 4개 (2x2 그리드) -->
    <!-- 왼쪽 위 ① -->
    <a-box id="cbg0" width="1.8" height="0.46" depth="0.07" position="-1.02 0.48 0.04"
      material="color:#1a1510;roughness:0.8" class="btn" btn-hover data-action="choice_0"></a-box>
    <a-text id="ctx0" value="" align="center" color="#c8a96e" width="1.9" wrap-count="16" position="-1.02 0.48 0.09"
      class="btn" btn-hover data-action="choice_0"></a-text>

    <!-- 오른쪽 위 ② -->
    <a-box id="cbg1" width="1.8" height="0.46" depth="0.07" position="1.02 0.48 0.04"
      material="color:#1a1510;roughness:0.8" class="btn" btn-hover data-action="choice_1"></a-box>
    <a-text id="ctx1" value="" align="center" color="#c8a96e" width="1.9" wrap-count="16" position="1.02 0.48 0.09"
      class="btn" btn-hover data-action="choice_1"></a-text>

    <!-- 왼쪽 아래 ③ -->
    <a-box id="cbg2" width="1.8" height="0.46" depth="0.07" position="-1.02 -0.1 0.04"
      material="color:#1a1510;roughness:0.8" class="btn" btn-hover data-action="choice_2"></a-box>
    <a-text id="ctx2" value="" align="center" color="#c8a96e" width="1.9" wrap-count="16" position="-1.02 -0.1 0.09"
      class="btn" btn-hover data-action="choice_2"></a-text>

    <!-- 오른쪽 아래 ④ -->
    <a-box id="cbg3" width="1.8" height="0.46" depth="0.07" position="1.02 -0.1 0.04"
      material="color:#1a1510;roughness:0.8" class="btn" btn-hover data-action="choice_3"></a-box>
    <a-text id="ctx3" value="" align="center" color="#c8a96e" width="1.9" wrap-count="16" position="1.02 -0.1 0.09"
      class="btn" btn-hover data-action="choice_3"></a-text>

    <!-- 피드백 -->
    <a-text id="feedback-text" value="" align="center" color="#5dcaa5" width="3.5" position="0 -0.72 0.04"></a-text>

    <!-- 안내 -->
    <a-text value="시선 1.5초 고정 → 선택 / Gaze 1.5s to choose" align="center" color="#2e2c28" width="3.5" position="0 -1.08 0.04"></a-text>
    <a-text value="WASD 키 또는 컨트롤러로 이동" align="center" color="#2a2820" width="3.5" position="0 -1.28 0.04"></a-text>
  </a-entity>

  <!-- ══════════════════════════════════════════════════════════════════════
       결과 패널 (방 가운데 허공)
  ══════════════════════════════════════════════════════════════════════════ -->
  <a-entity id="result-panel" position="0 2.0 -2.5" visible="false">
    <a-box width="3.2" height="3.0" depth="0.07" material="color:#060408;roughness:0.95;opacity:0.98"></a-box>
